version: "3.9"
networks:
  myAppNetwork:
    driver: bridge

volumes:
  pg_data:
  api_backup:
  api_images:

services:
  postgresServerDb:
    container_name: container-postgres
    image: postgres:17.9-bookworm
    ports:
      - "5022:5432"
    environment:
      - POSTGRES_USER=olxapi
      - POSTGRES_PASSWORD=*dmUntdOidd3d_#WTi4B9ZoZp%rSDj4Imds07djc*
      - POSTGRES_DB=olxDb
    networks:
      - myAppNetwork
    volumes:
      # Use named volume instead of /data/...
      - pg_data:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5

  app:
    container_name: olx_container
    build: ./OLX.API
    image: olx-asp-api
    ports:
      - "5817:8080"
    networks:
     - myAppNetwork
    depends_on:
      - postgresServerDb
    volumes:
     # Use named volumes instead of /volumes/olx-asp/...
     - api_backup:/app/backup
     - api_images:/app/uploading
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
  client:
    container_name: olx_client_container
    build: ./OLX.Frontend
    image: olx-client
    restart: on-failure
    ports:
      - "5092:80"
